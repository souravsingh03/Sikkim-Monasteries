# Server
server.port=${PORT:8080}

# Database - PostgreSQL (Render Environment Variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=YourSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm1234567890
jwt.expiration=86400000



# CORS
spring.web.cors.allowed-origins=http://localhost:3000,https://sikkim-monasteries.onrender.com

# Actuator / Health Check
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always