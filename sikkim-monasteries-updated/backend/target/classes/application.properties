# Server
server.port=8080

# Database - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/authdb
spring.datasource.username=postgres
spring.datasource.password=datapass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=YourSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm1234567890
jwt.expiration=86400000
# 86400000 ms = 24 hours

# ── Email (Gmail example — replace with your credentials) ──────
# To use Gmail: enable "App Passwords" in your Google account
# Leave blank in dev — emails will just be logged to console
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.from=noreply@sikkim-monasteries.org
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Comment out the 4 lines above if you don't have email set up yet
# Emails will be logged to console instead of sent

# CORS - allow your React/Next.js frontend
spring.web.cors.allowed-origins=http://localhost:3000

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
